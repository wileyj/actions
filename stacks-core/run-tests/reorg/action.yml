    - name: Run Tests
      id: run-tests
      shell: bash
      run: |
        cargo nextest run \
          --verbose \
          --archive-file ${{ inputs.archive-file }} \
          --test-threads 1 \
          --retries 0 \
          --run-ignored all \
          --no-fail-fast \
          --success-output immediate-final \
          --status-level fail \
          -E "test(=${{ inputs.test-name }})"

