name: "Build Test Archive Caches"
description: "Build Test Archive Caches"
branding:
  icon: "archive"
  color: "gray-dark"

inputs:
  genesis:
    description: "Run steps for genesis test archive"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    ## Perform a lookup to check if the caches already exist
    - name: Check Cargo Target Cache
      uses: stacks-network/actions/stacks-core/cache/target@main
      id: check_target_cache

    - name: Check Test Archive Cache
      uses: stacks-network/actions/stacks-core/cache/test-archive@main
      id: check_test_archive_cache

    - name: Check Genesis Test Archive Cache
      if: |
        inputs.genesis == 'true'
      uses: stacks-network/actions/stacks-core/cache/genesis-test-archive@main
      id: check_genesis_test_archive_cache

    ## Determine if a build is required based on cache status.
    - name: Compute Build Plan
      id: build_plan
      shell: bash
      run: |
        target_hit="${{ steps.check_target_cache.outputs.cache-hit }}"
        test_hit="${{ steps.check_test_archive_cache.outputs.cache-hit }}"
        genesis_hit="${{ steps.check_genesis_test_archive_cache.outputs.cache-hit }}"
        genesis="${{ inputs.genesis }}"

        build_required=false
        genesis_required=false

        # If either the target cache or test archive cache is missing, we need a rebuild.
        if [[ "$target_hit" != "true" || "$test_hit" != "true" ]]; then
          build_required=true
        fi

        # If genesis is requested and the genesis archive cache is missing, we also need a rebuild.
        # NOTE: Guarded on inputs.genesis because skipped steps produce empty outputs.
        if [[ "$genesis" == "true" && "$genesis_hit" != "true" ]]; then
          build_required=true
        fi

        # If genesis is requested and any rebuild is needed, rebuild the genesis archive too.
        if [[ "$genesis" == "true" && "$build_required" == "true" ]]; then
          genesis_required=true
        fi

        echo "build_required=$build_required" >> "$GITHUB_OUTPUT"
        echo "genesis_required=$genesis_required" >> "$GITHUB_OUTPUT"

    - name: Checkout the latest code
      if: steps.build_plan.outputs.build_required == 'true'
      id: git_checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Rust Toolchain
      if: steps.build_plan.outputs.build_required == 'true'
      id: setup_rust_toolchain
      uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
      with:
        components: llvm-tools-preview
        cache: false

    - name: Restore Cargo Cache
      if: steps.build_plan.outputs.build_required == 'true'
      id: restore_cargo_cache
      uses: stacks-network/actions/stacks-core/cache/cargo@main
      with:
        action: restore

    - name: Build and Archive Tests
      if: steps.build_plan.outputs.build_required == 'true'
      id: archive_tests
      shell: bash
      run: |
        export RUSTFLAGS="-C instrument-coverage" && \
        cargo nextest archive \
          --workspace \
          --tests \
          --locked \
          --features monitoring_prom \
          --archive-file ~/test_archive.tar.zst

    - name: Build and Archive Genesis Tests
      if: steps.build_plan.outputs.genesis_required == 'true'
      id: archive_genesis_tests
      shell: bash
      run: |
        export RUSTFLAGS="-C instrument-coverage" && \
        cd stacks-node && \
        cargo nextest archive \
          --workspace \
          --tests \
          --locked \
          --features prod-genesis-chainstate \
          --features monitoring_prom \
          --archive-file ~/genesis_archive.tar.zst

    ## Save Caches
    - name: Cache Cargo Target
      if: steps.build_plan.outputs.build_required == 'true'
      id: save_target_cache
      uses: stacks-network/actions/stacks-core/cache/target@main
      with:
        action: save

    - name: Cache Test Archive
      if: steps.build_plan.outputs.build_required == 'true'
      id: save_nextest_cache
      uses: stacks-network/actions/stacks-core/cache/test-archive@main
      with:
        action: save

    - name: Cache Genesis Archive
      if: steps.build_plan.outputs.genesis_required == 'true'
      id: save_genesis_cache
      uses: stacks-network/actions/stacks-core/cache/genesis-test-archive@main
      with:
        action: save
